<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .icon-gray {
      filter: brightness(0) saturate(100%) invert(60%) sepia(6%) saturate(300%) hue-rotate(180deg);
    }

    .icon-white {
      filter: brightness(0) invert(1);
    }
  </style>
</head>

<body>

<div id="app" class="w-full min-h-screen flex flex-col">

  <!-- SCROLL -->
  <div class="flex-1 overflow-y-auto p-4 pb-28">

    <!-- HEADER -->
    <div class="flex items-center justify-between mb-4">
      <div>
        <p class="text-xs text-gray-400">Explore</p>
        <p class="text-lg font-semibold">Smart Features</p>
      </div>

      <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center">
        <img src="https://www.svgrepo.com/show/528866/bell.svg" class="w-5 h-5 icon-gray">
      </div>
    </div>

    <!-- FEATURE CARDS -->
    <div class="space-y-4">

      <!-- AI MATCH -->
      <div class="p-4 rounded-2xl bg-gradient-to-r from-purple-800 to-purple-500 text-white shadow">
        <h3 class="font-semibold text-sm">AI Match</h3>
        <p class="text-xs mt-1 opacity-90">Find people that match your vibe instantly</p>
      </div>

      <!-- BOOST PROFILE -->
      <div class="p-4 rounded-2xl bg-gray-100">
        <h3 class="font-semibold text-sm">Boost Profile</h3>
        <p class="text-xs text-gray-500 mt-1">Get more visibility for your avatar</p>
      </div>

      <!-- VERIFIED USERS -->
      <div class="p-4 rounded-2xl bg-gray-100">
        <h3 class="font-semibold text-sm">Verified Users</h3>
        <p class="text-xs text-gray-500 mt-1">Connect only with trusted profiles</p>
      </div>

      <!-- PREMIUM -->
      <div class="p-4 rounded-2xl bg-gray-100">
        <h3 class="font-semibold text-sm">Go Premium</h3>
        <p class="text-xs text-gray-500 mt-1">Unlock unlimited chats & features</p>
      </div>

    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="fixed bottom-0 left-0 right-0 bg-white p-3 border-t">

    <div class="flex justify-around items-center bg-gray-100 rounded-full p-2 shadow-sm">

      <!-- CHATS -->
      <div class="w-10 h-10 flex items-center justify-center">
        <img src="https://www.svgrepo.com/show/533238/message-circle-dots.svg" class="w-5 h-5 icon-gray">
      </div>

      <!-- DISCOVER -->
      <div class="w-10 h-10 flex items-center justify-center">
        <img src="https://www.svgrepo.com/show/532239/compass.svg" class="w-5 h-5 icon-gray">
      </div>

      <!-- ✅ ACTIVE: OTHER -->
      <div class="px-6 py-2 rounded-full bg-gradient-to-r from-purple-800 to-purple-500 text-white flex items-center gap-2 shadow">
        <img src="https://www.svgrepo.com/show/532659/sparkles.svg" class="w-5 h-5 icon-white">
        <span class="text-sm">Explore</span>
      </div>

    </div>

  </div>

</div>

<script>
const { createApp } = Vue;
createApp({}).mount('#app');
</script>

</body>
          </html>
